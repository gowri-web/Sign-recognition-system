<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signature Recognition System</title>
    <style>
        :root {
            --sidebar-bg: #d4cc8c;
            --main-bg: #ccc484;
            --card-bg: #f5f3e7;
            --btn-blue: #3b71ed;
            --btn-green: #198754;
            --btn-gray: #6c757d;
            --btn-red: #dc3545;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            background-color: var(--main-bg);
        }

        /* Sidebar Styling */
        .sidebar {
            width: 300px;
            background-color: var(--sidebar-bg);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            border-right: 1px solid rgba(0,0,0,0.1);
        }

        .sidebar h2 { margin: 0; font-size: 1.5rem; color: #333; }
        .section-label { font-size: 0.8rem; font-weight: bold; color: #666; margin-bottom: 5px; }

        /* Main Content Styling */
        .main-content {
            flex-grow: 1;
            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .previews-container {
            display: flex;
            gap: 20px;
            justify-content: space-around;
        }

        .preview-box {
            flex: 1;
            background: white;
            border: 3px dashed #bbb;
            border-radius: 10px;
            height: 350px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .preview-box img { max-width: 100%; max-height: 100%; }
        .preview-label { position: absolute; top: -30px; font-weight: bold; width: 100%; text-align: center; }

        .status-card {
            background-color: var(--card-bg);
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .status-card h3 { color: #888; margin: 0; font-size: 1rem; }
        #status-text { font-size: 3rem; font-weight: 900; color: #7a7a7a; margin-top: 10px; text-transform: uppercase; }

        /* Buttons & Inputs */
        button {
            padding: 12px;
            border: none;
            border-radius: 5px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.9; }
        
        input[type="text"] {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            width: 100%;
            box-sizing: border-box;
        }

        .btn-blue { background-color: var(--btn-blue); }
        .btn-green { background-color: var(--btn-green); width: 100%; font-size: 1.1rem; }
        .btn-gray { background-color: var(--btn-gray); width: 100%; }
        .btn-red { background-color: var(--btn-red); width: 100%; }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Signature <br> Recognition System</h2>
        
        <div>
            <div class="section-label">INPUT SECTION</div>
            <button class="btn-blue" onclick="document.getElementById('inputImg').click()">Upload Input</button>
            <input type="file" id="inputImg" class="hidden" accept="image/*">
        </div>

        <div>
            <div class="section-label">REFERENCE SECTION</div>
            <input type="text" id="userId" placeholder="Enter User ID">
            <button class="btn-blue" style="margin-top:10px" onclick="document.getElementById('refImg').click()">Upload New Reference</button>
            <input type="file" id="refImg" class="hidden" accept="image/*">
            <button class="btn-blue" style="margin-top:10px" onclick="loadReference()">Load Reference from DB</button>
        </div>

        <div style="margin-top: auto; display: flex; flex-direction: column; gap: 10px;">
            <button class="btn-green" onclick="recognize()">RECOGNITION</button>
            <button class="btn-gray" onclick="location.reload()">Clear All</button>
            <button class="btn-red" onclick="window.close()">Exit Application</button>
        </div>
    </div>

    <div class="main-content">
        <div class="previews-container">
            <div class="preview-box">
                <span class="preview-label">Input Signature Preview</span>
                <img id="inputPreview" src="" alt="">
                <span id="inputText">No input uploaded</span>
            </div>
            <div class="preview-box">
                <span class="preview-label">Reference Signature Preview</span>
                <img id="refPreview" src="" alt="">
                <span id="refText">No reference loaded</span>
            </div>
        </div>

        <div class="status-card">
            <h3>RECOGNITION RESULT</h3>
            <div id="status-text">AWAITING PROCESSING</div>
        </div>
    </div>

    <script>
        // UPDATED FOR RENDER DEPLOYMENT
        const API_URL = "https://signature-lab.onrender.com/api";
        let inputBase64 = "";
        let refBase64 = "";

        // Handle Image Uploads
        function handleFile(inputElement, previewId, textId, callback) {
            const file = inputElement.files[0];
            const reader = new FileReader();
            reader.onloadend = () => {
                const b64 = reader.result.split(',')[1];
                document.getElementById(previewId).src = reader.result;
                document.getElementById(textId).style.display = 'none';
                callback(b64);
            };
            if (file) reader.readAsDataURL(file);
        }

        document.getElementById('inputImg').onchange = (e) => 
            handleFile(e.target, 'inputPreview', 'inputText', (b64) => inputBase64 = b64);

        document.getElementById('refImg').onchange = (e) => {
            handleFile(e.target, 'refPreview', 'refText', (b64) => {
                refBase64 = b64;
                saveReference(); 
            });
        };

        async function saveReference() {
            const userId = document.getElementById('userId').value;
            if(!userId) return alert("Enter User ID first!");
            
            try {
                const res = await fetch(`${API_URL}/save_reference`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ user_id: userId, reference_b64: refBase64 })
                });
                const data = await res.json();
                if(data.success) alert("Reference saved to Database!");
            } catch (err) {
                console.error("Error saving reference:", err);
            }
        }

        async function loadReference() {
            const userId = document.getElementById('userId').value;
            if(!userId) return alert("Enter User ID first!");
            
            try {
                const res = await fetch(`${API_URL}/get_reference?userId=${userId}`);
                const data = await res.json();
                if(data.success) {
                    refBase64 = data.signatureB64;
                    document.getElementById('refPreview').src = `data:image/png;base64,${refBase64}`;
                    document.getElementById('refText').style.display = 'none';
                } else {
                    alert("User ID not found in database.");
                }
            } catch (err) {
                alert("Error connecting to server.");
            }
        }

        async function recognize() {
            if(!inputBase64 || !refBase64) return alert("Upload both signatures!");
            
            const statusDiv = document.getElementById('status-text');
            statusDiv.innerText = "PROCESSING...";
            statusDiv.style.color = "#7a7a7a";

            try {
                const res = await fetch(`${API_URL}/recognize`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ 
                        input_image_b64: inputBase64, 
                        reference_image_b64: refBase64 
                    })
                });
                const data = await res.json();
                
                if(data.is_match) {
                    statusDiv.innerText = `MATCHED (${data.similarity}%)`;
                    statusDiv.style.color = "#198754";
                } else {
                    statusDiv.innerText = `MISMATCH (${data.similarity}%)`;
                    statusDiv.style.color = "#dc3545";
                }
            } catch (err) {
                statusDiv.innerText = "SERVER ERROR";
                statusDiv.style.color = "#dc3545";
            }
        }
    </script>
</body>
</html>
